services:
  # Mongo embutido só para ambiente sem banco externo (ex.: teste local com compose).
  # Produção na VPS usa MONGODB_URI do .env → container oticas-queiroz-db (profile não ativado).
  mongodb:
    profiles: ["bundled-mongo"]
    image: mongo:7.0
    container_name: oticas-queiroz-mongodb
    restart: unless-stopped
    command:
      [
        "mongod",
        "--replSet",
        "rs0",
        "--bind_ip_all",
        "--keyFile",
        "/etc/mongodb/keyfile",
      ]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD obrigatório}
      MONGO_INITDB_DATABASE: oticas-queiroz
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./scripts/mongo-init-rs.js:/docker-entrypoint-initdb.d/01-init-rs.js:ro
      - /opt/apps/oticas-queiroz/secrets/mongodb-keyfile:/etc/mongodb/keyfile:ro
    networks:
      - oticas-network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--host",
          "localhost",
          "--username",
          "${MONGO_ROOT_USER:-admin}",
          "--password",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    labels:
      - "traefik.enable=false"

  mongo-rs-init:
    profiles: ["bundled-mongo"]
    image: mongo:7.0
    container_name: oticas-queiroz-mongo-rs-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - oticas-network
    entrypoint: >
      mongosh --host mongodb --username ${MONGO_ROOT_USER:-admin}
              --password ${MONGO_ROOT_PASSWORD}
              --authenticationDatabase admin
              --eval "
                var initialized = true;
                try {
                  rs.status();
                } catch (error) {
                  initialized = false;
                }
                if (!initialized) {
                  rs.initiate({
                    _id: 'rs0',
                    members: [{ _id: 0, host: 'mongodb:27017' }]
                  });
                  print('Replica Set inicializado com sucesso');
                } else {
                  print('Replica Set já estava inicializado');
                }
              "

  n8n:
    image: n8nio/n8n:latest
    container_name: oticas-queiroz-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - oticas-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=false"
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: oticas-queiroz-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
        required: false
      mongo-rs-init:
        condition: service_completed_successfully
        required: false
    environment:
      NODE_ENV: production
      PORT: 3333
      # Obrigatório no .env de produção (ex.: mongodb://user:pass@oticas-queiroz-db:27017/oticas_queiroz_db?...)
      MONGODB_URI: ${MONGODB_URI:?Defina MONGODB_URI no .env — apontando para o banco real, ex. oticas-queiroz-db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatório}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      BOT_API_KEY: ${BOT_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.oticasqueiroz.com.br}
      API_URL: ${API_URL:-https://api.app.oticasqueiroz.com.br}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-${EMAIL_PASS}}
      EMAIL_FROM: ${EMAIL_FROM}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      SWAGGER_SECRET: ${SWAGGER_SECRET}
      SICREDI_ENVIRONMENT: ${SICREDI_ENVIRONMENT:-production}
      SICREDI_API_KEY: ${SICREDI_API_KEY}
      SICREDI_ACCESS_CODE: ${SICREDI_ACCESS_CODE}
      SICREDI_BENEFICIARY_CODE: ${SICREDI_BENEFICIARY_CODE}
      SICREDI_COOPERATIVE_CODE: ${SICREDI_COOPERATIVE_CODE}
      SICREDI_POST_CODE: ${SICREDI_POST_CODE}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN}
      # Rate limiting (opcional — ver apps/backend/.env.example)
      RATE_LIMIT_DISABLED: ${RATE_LIMIT_DISABLED:-false}
      RATE_LIMIT_GLOBAL_MAX: ${RATE_LIMIT_GLOBAL_MAX:-1000}
      RATE_LIMIT_GLOBAL_WINDOW_MS: ${RATE_LIMIT_GLOBAL_WINDOW_MS:-60000}
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-20}
      RATE_LIMIT_LOGIN_WINDOW_MS: ${RATE_LIMIT_LOGIN_WINDOW_MS:-900000}
      RATE_LIMIT_REFRESH_MAX: ${RATE_LIMIT_REFRESH_MAX:-60}
      RATE_LIMIT_REFRESH_WINDOW_MS: ${RATE_LIMIT_REFRESH_WINDOW_MS:-900000}
      RATE_LIMIT_FORGOT_MAX: ${RATE_LIMIT_FORGOT_MAX:-10}
      RATE_LIMIT_FORGOT_WINDOW_MS: ${RATE_LIMIT_FORGOT_WINDOW_MS:-900000}
      RATE_LIMIT_RESET_MAX: ${RATE_LIMIT_RESET_MAX:-10}
      RATE_LIMIT_RESET_WINDOW_MS: ${RATE_LIMIT_RESET_WINDOW_MS:-900000}
      RATE_LIMIT_BOT_MAX: ${RATE_LIMIT_BOT_MAX:-30}
      RATE_LIMIT_BOT_WINDOW_MS: ${RATE_LIMIT_BOT_WINDOW_MS:-60000}
    networks:
      - oticas-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-public}"
      # Rota 1: subdomínio da API (usado pelo frontend: NEXT_PUBLIC_API_URL)
      - "traefik.http.routers.oticas-api-host.rule=Host(`api.app.oticasqueiroz.com.br`)"
      - "traefik.http.routers.oticas-api-host.entrypoints=websecure"
      - "traefik.http.routers.oticas-api-host.tls.certresolver=letsencrypt"
      - "traefik.http.routers.oticas-api-host.service=oticas-api"
      # Rota 2: mesmo domínio do app com prefixo /api (health, curl, compatibilidade)
      - "traefik.http.routers.oticas-api.rule=Host(`app.oticasqueiroz.com.br`) && PathPrefix(`/api`)"
      - "traefik.http.routers.oticas-api.entrypoints=websecure"
      - "traefik.http.routers.oticas-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.oticas-api.service=oticas-api"
      - "traefik.http.services.oticas-api.loadbalancer.server.port=3333"

  whatsapp-bot:
    build:
      context: .
      dockerfile: apps/whatsapp-bot/Dockerfile
    container_name: oticas-queiroz-whatsapp-bot
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3344
      BOT_API_KEY: ${BOT_API_KEY:-}
      # URL interna na rede Docker (path = Production Webhook do workflow n8n)
      # O path deve corresponder ao Webhook node do workflow no n8n (sem "-test").
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/whatsapp-inbound}
      # URL do backend ERP na rede Docker interna
      ERP_API_URL: ${ERP_API_URL:-http://backend:3333}
      # Modo de operação: erp (recomendado em produção) | n8n (webhook publicado)
      BOT_CHAT_MODE: ${BOT_CHAT_MODE:-erp}
      # Se n8n falhar, cai automaticamente no ERP
      BOT_ERP_FALLBACK_ON_N8N_ERROR: ${BOT_ERP_FALLBACK_ON_N8N_ERROR:-true}
      WA_SESSION_PATH: /app/apps/whatsapp-bot/data/auth
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Timeout curto no n8n evita resposta lenta quando o workflow não existe ou está lento
      N8N_WEBHOOK_TIMEOUT_MS: ${N8N_WEBHOOK_TIMEOUT_MS:-3000}
      WA_RECONNECT_DELAY_MS: ${WA_RECONNECT_DELAY_MS:-3000}
    volumes:
      # Bind mount: sessão fica no host em ./whatsapp-auth (persiste recreações de container)
      # Em produção: /opt/apps/oticas-queiroz/whatsapp-auth
      # Backup automático feito em código a cada creds.update → auth-backup/
      - /opt/apps/oticas-queiroz/whatsapp-auth:/app/apps/whatsapp-bot/data/auth
    networks:
      - oticas-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3344/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=false"

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.app.oticasqueiroz.com.br}
    container_name: oticas-queiroz-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.app.oticasqueiroz.com.br}
    networks:
      - oticas-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-public}"
      - "traefik.http.routers.oticas-web.rule=Host(`app.oticasqueiroz.com.br`)"
      - "traefik.http.routers.oticas-web.entrypoints=websecure"
      - "traefik.http.routers.oticas-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.oticas-web.loadbalancer.server.port=3000"
      # Redirecionar HTTP → HTTPS
      - "traefik.http.routers.oticas-web-http.rule=Host(`app.oticasqueiroz.com.br`)"
      - "traefik.http.routers.oticas-web-http.entrypoints=web"
      - "traefik.http.routers.oticas-web-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  n8n_data:
    driver: local

networks:
  # Rede interna para desenvolvimento local (Docker Desktop).
  # Em produção com Traefik, use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
  oticas-network:
    name: oticas-network
    driver: bridge
