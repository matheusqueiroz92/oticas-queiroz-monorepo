name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint --workspace=apps/backend

      - name: Lint frontend
        run: npm run lint --workspace=apps/web

      - name: Lint whatsapp-bot
        run: npm run lint --workspace=apps/whatsapp-bot

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-32-chars-long!!
      MONGODB_URI: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: apps/backend
        run: npm run coverage -- --ci --forceExit

      - name: Run whatsapp-bot tests
        working-directory: apps/whatsapp-bot
        run: npm run test -- --ci --forceExit

      - name: Run frontend tests
        working-directory: apps/web
        run: npm run test:ci

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all apps
        run: npx turbo run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ""

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no root@147.79.107.246 "
            set -e
            cd /var/www/oticas-queiroz
            git fetch origin main
            git reset --hard origin/main
            cd /opt/apps/oticas-queiroz
            docker compose pull --quiet 2>/dev/null || true
            docker compose up --build -d
            docker compose ps
          "
