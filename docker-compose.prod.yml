# Overlay para deploy no VPS com Traefik (rede externa já criada no servidor).
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# MongoDB: MONGODB_URI no .env deve apontar para o container oticas-queiroz-db.
# O backend precisa estar na MESMA rede Docker que o banco (veja MONGO_DOCKER_NETWORK).
# Não ative o profile bundled-mongo em produção.

networks:
  oticas-network:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-public}
  # Rede onde o container oticas-queiroz-db está (descubra com: docker inspect oticas-queiroz-db)
  mongo-network:
    external: true
    name: ${MONGO_DOCKER_NETWORK:-traefik-public}

services:
  backend:
    networks:
      - oticas-network
      - mongo-network
